name: verify-and-publish
# Re-derive FXRP solvency from live Flare + XRPL, append to the history log, and publish the attestation
# page + status badge to GitHub Pages. Runs every 6 hours (solvency is a live property), on push, and on demand.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - history.jsonl        # the run commits history.jsonl back; ignore it so that commit can't retrigger us

permissions:
  contents: write   # commit the appended history.jsonl back to the repo
  pages: write
  id-token: write
  issues: write     # open an alert issue if the verdict is ever non-SOLVENT

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install web3
      - name: Re-derive FXRP solvency (Flare + XRPL) and prove it discriminates
        run: |
          python fassets_verify.py --json > /dev/null
          python negative_test.py            # fail the build if the verifier ever stops flagging bad cases
          python append_history.py           # append this run's verdict to history.jsonl (dedups by block)
          python make_badge.py               # -> status.svg (live SOLVENT/⚠ badge)
          python render_attestation.py       # -> attestation.html (pinned, self-contained, with the history strip)
      - name: Commit the appended history back (so the timeline persists across runs)
        run: |
          git config user.name  "kvt-verifier[bot]"
          git config user.email "kvt-verifier@users.noreply.github.com"
          git add history.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "chore(history): append verdict $(python -c "import json;print(json.load(open('reserves.json'))['assets'][0]['verdict'])") [skip ci]"
            git push
          else
            echo "history unchanged (same block) — nothing to commit"
          fi
      - name: Alert if FXRP is ever non-SOLVENT (does NOT block the deploy — the page must show the truth)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V=$(python -c "import json;print(json.load(open('reserves.json'))['assets'][0]['verdict'])")
          echo "live verdict: $V"
          if [ "$V" != "SOLVENT" ]; then
            PIN=$(python -c "import json;p=json.load(open('reserves.json'))['pinned'];print('Flare block',p['flare_block'],'· XRPL ledger',p['xrpl_ledger'])")
            echo "::warning::FXRP verdict is $V (not SOLVENT) at $PIN"
            if [ -z "$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --label solvency-alert --json number -q '.[0].number' 2>/dev/null)" ]; then
              gh issue create --repo "$GITHUB_REPOSITORY" --label solvency-alert \
                --title "⚠️ FXRP independent verifier: $V" \
                --body "The independent dual-leg verifier returned **$V** for FXRP at $PIN. Investigate before alarming (check in-flight mint/redeem windows and the Core-Vault escrow). Live dashboard: https://hugegreencandle.github.io/fassets-verify/" \
                || echo "(issue create skipped — label may be missing; create the 'solvency-alert' label once)"
            fi
          fi
      - name: Assemble site
        run: |
          mkdir -p _site
          cp attestation.html _site/index.html
          cp reserves.json _site/reserves.json
          cp status.svg _site/status.svg
          cp history.jsonl _site/history.jsonl
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
